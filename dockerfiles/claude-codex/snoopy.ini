;
; snoopy.ini - OS-level exec auditing for the claude-codex image (issue #280).
;
; snoopy is an LD_PRELOAD command logger, enabled image-wide via
; /etc/ld.so.preload. It records every execve() that happens inside the
; container, independently of what the AI agents write to their own session
; logs. No privileges are required, so it works in the unprivileged
; `make target=claude` / `make target=codex` sandbox (unlike auditd / eBPF /
; process accounting, whose kernel subsystems are not namespaced).
;
; The log is consumed by `ai-audit`, which expects exactly this one-line,
; pipe-delimited format. The command line is kept LAST so it may safely contain
; '|' (the parser bounds the split). Fields:
;   marker | unix_timestamp | uid | username | cwd | cmdline
;
[snoopy]

; Write to a plain file (no syslog daemon runs in the container). At runtime the
; Makefile bind-mounts ~/.shared_cache.ai-audit over /var/log/ai-audit so the
; log survives the --rm container; the entrypoint makes the file writable.
output = file:/var/log/ai-audit/exec.log

message_format = "snoopy-audit|%{timestamp}|%{uid}|%{username}|%{cwd}|%{cmdline}"

; Log everything; ai-audit does any filtering at report time.
filter_chain = ""
